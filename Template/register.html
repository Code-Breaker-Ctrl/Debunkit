<!DOCTYPE html>
<html lang="en" data-theme="{{ current_user.theme if current_user.is_authenticated and current_user.theme else 'dark' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>DEBUNK.IT | Sign Up</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='Images/debunkit-logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/auth.css') }}">
</head>
<body>
    <canvas id="canvas-bg" aria-hidden="true"></canvas>

    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>DEBUNK.IT</h1>
                <p>Create Your Account</p>
            </div>

            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required minlength="3">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input-group">
                        <input type="password" id="password" name="password"
                        placeholder="Min 8 chars: uppercase, lowercase, number, special character"
                        required minlength="8">
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password')">👁️</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password-confirm">Confirm Password</label>
                    <div class="password-input-group">
                        <input type="password" id="password-confirm" name="password-confirm" placeholder="Confirm password" required>
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password-confirm')">👁️</button>
                    </div>
                </div>

                <button type="submit" class="auth-btn">CREATE ACCOUNT</button>

                <div class="auth-divider">or</div>

                <p class="auth-switch">
                    Already have an account? <a href="/login">Log in here</a>
                </p>
            </form>

            <div id="error-message" class="error-message" style="display: none;"></div>
            <div id="success-message" class="success-message" style="display: none;"></div>
        </div>
    </div>
    <script>
        (function () {
            const savedTheme = localStorage.getItem('debunkit_theme')
                || document.documentElement.getAttribute('data-theme')
                || 'system';

            const savedBgMode = localStorage.getItem('debunkit_bg_mode') || 'animated';

            document.documentElement.setAttribute('data-theme', savedTheme);

            document.addEventListener('DOMContentLoaded', () => {
                const body = document.body;
                const canvas = document.getElementById('canvas-bg');

                body.classList.remove('bg-solid', 'bg-gradient', 'bg-animated', 'no-canvas');

                if (savedBgMode === 'solid') {
                    body.classList.add('bg-solid', 'no-canvas');
                    if (canvas) canvas.style.display = 'none';
                } else if (savedBgMode === 'gradient') {
                    body.classList.add('bg-gradient', 'no-canvas');
                    if (canvas) canvas.style.display = 'none';
                } else {
                    body.classList.add('bg-animated');
                    if (canvas) canvas.style.display = 'block';
                }
            });
        })();
    </script>
    <script src="{{ url_for('static', filename='JS/canvas.js') }}"></script>
    <script>
        function togglePasswordVisibility(fieldId) {
            const field = document.getElementById(fieldId);
            const type = field.getAttribute('type') === 'password' ? 'text' : 'password';
            field.setAttribute('type', type);
        }
        function getCSRFToken() {
            const meta = document.querySelector('meta[name="csrf-token"]');
            return meta ? meta.getAttribute('content') : '';
        }

        function csrfHeaders(headers = {}) {
            return {
                ...headers,
                'X-CSRFToken': getCSRFToken()
            };
        }

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password-confirm').value;
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            
            if (password !== passwordConfirm) {
                errorDiv.textContent = 'Passwords do not match!';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
                return;
            }
            
            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: csrfHeaders({
                        'Content-Type': 'application/json'
                    }),
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    successDiv.textContent = data.message + ' Redirecting to login...';
                    successDiv.style.display = 'block';
                    errorDiv.style.display = 'none';
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    errorDiv.textContent = data.error;
                    errorDiv.style.display = 'block';
                    successDiv.style.display = 'none';
                }
            } catch (error) {
                errorDiv.textContent = 'Registration failed. Please try again.';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
            }
        });
    </script>
</body>
</html>
