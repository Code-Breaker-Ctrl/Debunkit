{% extends "base.html" %}
{% block title %}Login – Debunk.IT{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="brand-icon">🔍</span>
      <h1>Debunk<span class="brand-accent">.IT</span></h1>
      <p class="auth-tagline">Sign in to continue fact-checking</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}" class="auth-form" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

      <div class="form-group">
        <label for="identifier" class="form-label">Email or Username</label>
        <input
          type="text"
          id="identifier"
          name="identifier"
          class="form-input"
          value="{{ identifier|default('') }}"
          placeholder="Enter your email or username"
          autocomplete="username"
          required
        />
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <div class="input-wrap">
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />
          <button type="button" class="toggle-pw" onclick="togglePassword('password')" aria-label="Show password">👁</button>
        </div>
      </div>

      <div class="form-row">
        <label class="checkbox-label">
          <input type="checkbox" name="remember" /> Remember me
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a href="{{ url_for('signup') }}">Create one →</a></p>
    </div>
  </div>
</div>
{% endblock %}
